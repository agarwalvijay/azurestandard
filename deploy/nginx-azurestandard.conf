# nginx reverse proxy for the Azure Standard push backend.
# Put at /etc/nginx/sites-available/azurestandard and symlink into sites-enabled,
# then run certbot to add TLS (certbot rewrites this file with the 443 block).
#
#   sudo ln -s /etc/nginx/sites-available/azurestandard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d azurestandard.atsumilabs.com

server {
    listen 80;
    listen [::]:80;
    server_name azurestandard.atsumilabs.com;

    location / {
        proxy_pass         http://127.0.0.1:8087;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
